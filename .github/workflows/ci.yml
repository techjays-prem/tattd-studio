name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-eval:
    name: Tests + Eval Harness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.9"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Run pytest unit tests
        run: uv run pytest tests/ -v

      - name: Run Eval Harness (Tier 1 + Tier 2)
        run: uv run pytest evals/tier1 evals/tier2 -v
